
name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install geode-sdk
        run: pip install --upgrade pip setuptools wheel && pip install geode-sdk

      - name: Build Mod
        run: geode build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: geode-android-build
          path: build/*.geode
